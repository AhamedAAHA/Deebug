# Production / external MongoDB (Atlas on Render)
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/boqmind}
spring.autoconfigure.exclude=de.flapdoodle.embed.mongo.spring.autoconfigure.EmbeddedMongoAutoConfiguration

# Cloudflare Pages previews: https://<hash>.deebug.pages.dev
# On Render set BOQMIND_CORS_ORIGINS to match, or delete it to use this default.
# CorsResponseFilter also allows *.deebug.pages.dev if env is misconfigured.
boqmind.cors.allowed-origins=${BOQMIND_CORS_ORIGINS:https://*.deebug.pages.dev,https://deebug.pages.dev,http://localhost:5173,http://127.0.0.1:5173}
