spring.application.name=boqmind-ai
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

server.port=${PORT:8080}

spring.data.mongodb.database=boqmind
spring.data.mongodb.auto-index-creation=true

# File upload
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
boqmind.upload.dir=./uploads

# OpenAI (set OPENAI_API_KEY and openai.enabled=true for live AI)
openai.api.key=${OPENAI_API_KEY:}
openai.api.url=${OPENAI_API_URL:https://api.openai.com/v1/chat/completions}
openai.enabled=${OPENAI_ENABLED:false}

# AI model and TTS tuning
aiml.model.analysis=${AIML_MODEL_ANALYSIS:gpt-4o-mini}
aiml.model.chat=${AIML_MODEL_CHAT:gpt-4o}
aiml.model.search=${AIML_MODEL_SEARCH:gpt-4o-search-preview}
aiml.model.search-mini=${AIML_MODEL_SEARCH_MINI:gpt-4o-mini-search-preview}
aiml.search.context-size=${AIML_SEARCH_CONTEXT_SIZE:medium}
aiml.model.intent=${AIML_MODEL_INTENT:gpt-4o-mini}
aiml.model.world=${AIML_MODEL_WORLD:gpt-4o}
aiml.model.vision=${AIML_MODEL_VISION:gpt-4o}
aiml.model.transcribe=${AIML_MODEL_TRANSCRIBE:whisper-1}
aiml.tts.model=${AIML_TTS_MODEL:openai/tts-1}
aiml.tts.voice=${AIML_TTS_VOICE:nova}
aiml.tts.speed=${AIML_TTS_SPEED:1.08}

# CORS (comma-separated origins; override with BOQMIND_CORS_ORIGINS in production)
boqmind.cors.allowed-origins=${BOQMIND_CORS_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}
